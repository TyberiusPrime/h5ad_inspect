name: Test

env:
  GITHUB_ACTIONS: true

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Cargo tests
        run: nix build -L .#test

      - name: Cargo check
        run: nix build -L .#check

      - name: Pytest (compare every export to anndata)
        run: nix build -L .#checks.x86_64-linux.pytest
